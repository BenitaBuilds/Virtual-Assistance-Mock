<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SMK Calendar Management Practice Lab</title>
<style>
:root{
  --bg:#f3f6fb;
  --surface:#ffffff;
  --surface-2:#eef2f9;
  --ink:#1f2430;
  --muted:#5f6478;
  --line:#e1e6f0;
  --primary:#1a73e8;
  --primary-ink:#0b47a1;
  --smk:#0b8f8f;
  --smk-dark:#076868;
  --gold:#f9ab00;
  --danger:#d93025;
  --danger-bg:#fdeceb;
  --success:#1e8e3e;
  --success-bg:#e8f6ec;
  --warn-bg:#fff8e5;
  --client:#1a73e8;
  --internal:#34a853;
  --personal:#8430ce;
  --deadline:#d93025;
  --radius:10px;
  --font-display: "Segoe UI Semibold","Segoe UI",Roboto,-apple-system,BlinkMacSystemFont,sans-serif;
  --font-body: "Segoe UI",Roboto,-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono: "Consolas","SFMono-Regular",Menlo,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}

/* ---------- App shell ---------- */
#app{display:flex;flex-direction:column;min-height:100vh;}

.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--line);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;margin-right:4px;}
.brand-mark{
  width:38px;height:38px;border-radius:9px;
  background:linear-gradient(135deg,var(--smk),var(--smk-dark));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.5px;
  flex-shrink:0;
}
.brand-text{line-height:1.15;}
.brand-text .t1{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink);}
.brand-text .t2{font-size:11px;color:var(--muted);}

.tabs{display:flex;gap:2px;background:var(--surface-2);padding:3px;border-radius:10px;}
.tab-btn{
  border:none;background:transparent;padding:8px 14px;border-radius:8px;
  font-size:13px;font-weight:600;color:var(--muted);
}
.tab-btn.active{background:var(--surface);color:var(--primary-ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}

.spacer{flex:1;}

.mode-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.switch{position:relative;width:42px;height:24px;background:var(--surface-2);border-radius:20px;border:1px solid var(--line);flex-shrink:0;}
.switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--primary);transition:left .15s ease;}
.switch.on .knob{left:22px;background:var(--smk);}

.btn{
  border:1px solid var(--line);background:var(--surface);color:var(--ink);
  padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:var(--surface-2);}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-ink);}
.btn-danger{background:var(--danger-bg);border-color:#f6c9c4;color:var(--danger);}
.btn-danger:hover{background:#fbdad6;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--surface-2);}
.btn-sm{padding:5px 10px;font-size:12px;}

/* ---------- Layout ---------- */
.layout{display:flex;flex:1;min-height:0;}
.sidebar{
  width:270px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--line);
  padding:14px 12px 40px;
  overflow-y:auto;
}
.main{flex:1;min-width:0;padding:16px;overflow-x:hidden;}

.side-section{margin-bottom:16px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface);}
.side-head{
  padding:9px 12px;background:var(--surface-2);
  font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;justify-content:between;gap:6px;
}
.side-body{padding:10px 12px;font-size:12.5px;color:var(--ink);}
.side-body p{margin:0 0 6px;}
.profile-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a73e8,#8430ce);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display);flex-shrink:0;}
.profile-name{font-weight:700;font-size:13.5px;}
.profile-role{font-size:11.5px;color:var(--muted);}
ul.tight{margin:0;padding-left:16px;}
ul.tight li{margin-bottom:5px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chip{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--surface-2);color:var(--muted);}
.tz-tool select,.tz-tool input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;margin-bottom:6px;}
.tz-result{background:var(--surface-2);border-radius:6px;padding:8px;font-family:var(--font-mono);font-size:12.5px;text-align:center;font-weight:700;color:var(--smk-dark);}

.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* ---------- Calendar toolbar ---------- */
.cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.cal-toolbar .nav-btns{display:flex;gap:4px;}
.cal-title{font-family:var(--font-display);font-weight:700;font-size:18px;margin-right:6px;}
.view-toggle{display:flex;gap:2px;background:var(--surface-2);padding:3px;border-radius:9px;margin-left:auto;}
.view-btn{border:none;background:transparent;padding:7px 12px;border-radius:7px;font-size:12.5px;font-weight:700;color:var(--muted);}
.view-btn.active{background:var(--surface);color:var(--primary-ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}

/* ---------- Week / Day grid ---------- */
.grid-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.grid-head{display:grid;border-bottom:1px solid var(--line);}
.grid-head-cell{padding:8px 4px;text-align:center;border-left:1px solid var(--line);font-size:11.5px;color:var(--muted);font-weight:700;}
.grid-head-cell:first-child{border-left:none;}
.grid-head-cell .dow{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.4px;}
.grid-head-cell .dnum{font-family:var(--font-display);font-size:16px;color:var(--ink);}
.grid-head-cell.today .dnum{background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;line-height:26px;display:inline-block;}

.grid-body{display:grid;position:relative;}
.time-col{border-left:none;}
.time-slot{height:52px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);text-align:right;padding-right:6px;position:relative;top:-6px;}
.day-col{border-left:1px solid var(--line);position:relative;}
.hour-line{height:52px;border-top:1px solid var(--line);position:relative;}
.hour-line:hover{background:#f8faff;cursor:pointer;}
.hour-line.lunch{background:repeating-linear-gradient(45deg,var(--warn-bg),var(--warn-bg) 8px,#fffdf5 8px,#fffdf5 16px);}

.evt{
  position:absolute;left:3px;right:3px;border-radius:6px;
  padding:4px 6px;font-size:11px;overflow:hidden;color:#fff;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.15);border-left:4px solid rgba(0,0,0,.25);
  line-height:1.3;
}
.evt b{display:block;font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evt .t{opacity:.9;font-size:10px;font-family:var(--font-mono);}
.evt.priority{outline:2px solid var(--gold);outline-offset:-2px;}
.evt.conflict{outline:2px dashed var(--danger);outline-offset:-2px;}
.evt-client{background:var(--client);}
.evt-internal{background:var(--internal);}
.evt-personal{background:var(--personal);}
.evt-deadline{background:var(--deadline);}

/* ---------- Month view ---------- */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.month-cell{
  min-height:96px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:6px;position:relative;background:var(--surface);cursor:pointer;
}
.month-cell:nth-child(7n){border-right:none;}
.month-cell.otherm{background:#fbfcfe;color:#c3c9d6;}
.month-cell:hover{background:#f8faff;}
.month-daynum{font-size:12px;font-weight:700;margin-bottom:4px;}
.month-daynum.today{background:var(--primary);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
.month-evt{
  font-size:10px;padding:2px 5px;border-radius:4px;color:#fff;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.month-more{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px;}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(20,25,40,.5);display:none;
  align-items:center;justify-content:center;z-index:200;padding:16px;
}
.modal-backdrop.show{display:flex;}
.modal{
  background:var(--surface);border-radius:14px;width:100%;max-width:560px;
  max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.modal-head h3{margin:0;font-family:var(--font-display);font-size:16px;flex:1;}
.modal-close{border:none;background:transparent;font-size:20px;color:var(--muted);padding:2px 8px;border-radius:6px;}
.modal-close:hover{background:var(--surface-2);}
.modal-body{padding:16px 20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}

.field{margin-bottom:12px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;
}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.check-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff;}
.badge-client{background:var(--client);}
.badge-internal{background:var(--internal);}
.badge-personal{background:var(--personal);}
.badge-deadline{background:var(--deadline);}
.badge-priority{background:var(--gold);color:#5c4200;}

.detail-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px;}
.detail-row .ico{width:20px;flex-shrink:0;color:var(--muted);text-align:center;}
.detail-row .val{flex:1;}
.detail-row .lbl{font-size:10.5px;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:1px;}

.alert{border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;}
.alert-warn{background:var(--warn-bg);color:#8a5b00;border:1px solid #f6df9c;}
.alert-danger{background:var(--danger-bg);color:#8a1c14;border:1px solid #f6c9c4;}
.alert-ok{background:var(--success-bg);color:#0f5c28;border:1px solid #b9e6c4;}
.alert ul{margin:4px 0 0;padding-left:16px;}

/* ---------- Panels: Modules / Inbox / Progress ---------- */
.panel-title{font-family:var(--font-display);font-size:20px;margin:0 0 4px;}
.panel-sub{color:var(--muted);font-size:13px;margin:0 0 16px;}

.module-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.module-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.module-num{
  width:32px;height:32px;border-radius:8px;background:var(--surface-2);color:var(--smk-dark);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px;flex-shrink:0;
}
.module-head-text{flex:1;}
.module-head-text .mt{font-weight:700;font-size:14px;}
.module-head-text .ms{font-size:11.5px;color:var(--muted);}
.module-score{font-size:12px;font-weight:700;color:var(--smk-dark);white-space:nowrap;}
.module-chevron{color:var(--muted);transition:transform .15s;}
.module-card.open .module-chevron{transform:rotate(90deg);}
.module-body{border-top:1px solid var(--line);padding:14px 16px;display:none;background:#fbfcfe;}
.module-card.open .module-body{display:block;}

.task-block{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;}
.task-block.passed{border-color:#b9e6c4;background:var(--success-bg);}
.task-title{font-weight:700;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.task-desc{font-size:12.5px;color:var(--ink);margin-bottom:8px;line-height:1.5;}
.hint{font-size:12px;color:var(--smk-dark);background:#eafafa;border:1px dashed #b7e6e6;padding:7px 9px;border-radius:6px;margin-bottom:8px;}
.quiz-opt{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px;cursor:pointer;}
.quiz-opt:hover{background:var(--surface-2);}
.quiz-opt input{margin-top:2px;}
.task-feedback{font-size:12px;margin-top:6px;padding:8px 10px;border-radius:6px;}
.task-feedback.ok{background:var(--success-bg);color:#0f5c28;}
.task-feedback.no{background:var(--danger-bg);color:#8a1c14;}

.inbox-list{display:flex;flex-direction:column;gap:8px;}
.inbox-item{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;}
.inbox-item:hover{background:#f8faff;}
.inbox-item.read{opacity:.6;}
.inbox-avatar{width:34px;height:34px;border-radius:50%;background:var(--smk);color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--font-display);}
.inbox-from{font-weight:700;font-size:13px;}
.inbox-subject{font-size:12.5px;color:var(--muted);margin-top:1px;}
.inbox-detail{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:14px;}

.gauge-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;}
.gauge-num{font-family:var(--font-display);font-size:15px;font-weight:700;fill:var(--ink);}
.progress-modules{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.pm-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px;}
.pm-card .pm-title{font-weight:700;font-size:12.5px;margin-bottom:6px;}
.pm-bar{height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden;}
.pm-bar-fill{height:100%;background:var(--smk);}
.pm-pct{font-size:11px;color:var(--muted);margin-top:4px;}

.log-feed{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;max-height:220px;overflow-y:auto;font-size:12px;}
.log-feed .lg-line{padding:5px 0;border-bottom:1px dashed var(--line);}
.log-feed .lg-line:last-child{border-bottom:none;}
.lg-time{color:var(--muted);font-family:var(--font-mono);margin-right:6px;}

.empty-note{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;}

@media (max-width:900px){
  .layout{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--line);}
  .topbar{gap:8px;}
  .tabs{order:3;width:100%;}
}
@media (max-width:560px){
  .grid-head-cell .dow{display:none;}
  .cal-title{font-size:15px;}
}
</style>
</head>
<body>

<div id="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">SMK</div>
      <div class="brand-text">
        <div class="t1">SMK Calendar Management Practice Lab</div>
        <div class="t2">Virtual Assistant Training Workspace</div>
      </div>
    </div>

    <div class="tabs" id="mainTabs">
      <button class="tab-btn active" data-tab="calendar">Calendar</button>
      <button class="tab-btn" data-tab="modules">Training Modules</button>
      <button class="tab-btn" data-tab="inbox">Client Inbox</button>
      <button class="tab-btn" data-tab="progress">My Progress</button>
    </div>

    <div class="spacer"></div>

    <div class="mode-toggle">
      <span id="modeLabel">Beginner Mode</span>
      <div class="switch" id="modeSwitch"><div class="knob"></div></div>
    </div>
    <button class="btn btn-primary btn-sm" id="newEventBtn">+ New Event</button>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>

</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalBox"></div>
</div>

<script>
(function(){
"use strict";

/* =========================================================
   DATA
   ========================================================= */
var CLIENT = {
  name:"Sarah Williams",
  role:"CEO, Bright Horizon Digital Marketing Agency",
  location:"New York, USA",
  tz:"EST (UTC-5)",
  vaLocation:"Nigeria",
  vaTz:"WAT (UTC+1)"
};

var PREFS = [
  "No meetings before 9:00 AM EST",
  "Lunch break protected: 12:30 PM \u2013 1:30 PM EST",
  "Maximum of 5 meetings per day",
  "Always include a 15-minute buffer between meetings",
  "Avoid scheduling meetings on Fridays after 2:00 PM EST",
  "Mark priority meetings clearly",
  "Internal meetings default to 30 minutes",
  "Client meetings default to 60 minutes",
  "Every important meeting needs an agenda"
];

var CATS = {
  client:{label:"Client Meeting", cls:"client"},
  internal:{label:"Internal Meeting", cls:"internal"},
  personal:{label:"Personal Event", cls:"personal"},
  deadline:{label:"Deadline", cls:"deadline"}
};

// Fixed simulation week: Mon Jan 12, 2026 - Sun Jan 18, 2026
var WEEK_START = new Date(2026,0,12);
function d(day,h,m){ // day offset 0-6 from WEEK_START, hour, minute -> "YYYY-MM-DD"
  var dt = new Date(WEEK_START); dt.setDate(dt.getDate()+day);
  return isoDate(dt);
}
function isoDate(dt){
  var y=dt.getFullYear(), mo=String(dt.getMonth()+1).padStart(2,'0'), da=String(dt.getDate()).padStart(2,'0');
  return y+"-"+mo+"-"+da;
}

var uidc = 1;
function mkEvent(o){
  o.id = "e"+(uidc++);
  o.isSeed = true;
  o.attendees = o.attendees || [];
  o.description = o.description || "";
  o.location = o.location || "";
  o.meetingLink = o.meetingLink || "";
  o.reminder = o.reminder || "";
  o.recurring = o.recurring || "none";
  o.priority = !!o.priority;
  return o;
}

var EVENTS = [
  // MONDAY Jan 12 - reference / demo day
  mkEvent({title:"Marketing Team Standup",category:"internal",date:d(0),start:"09:00",end:"09:30",attendees:["Internal Marketing Team"],description:"Quick weekly sync on campaign status.",reminder:"10"}),
  mkEvent({title:"Discovery Call \u2013 Nova Retail Group",category:"client",date:d(0),start:"10:00",end:"11:00",attendees:["Nova Retail Group"],description:"Intro call to understand Nova Retail's marketing goals.",meetingLink:"https://meet.smk-lab.sim/nova-retail",reminder:"15",priority:true}),
  mkEvent({title:"Content Calendar Review",category:"internal",date:d(0),start:"11:15",end:"11:45",attendees:["Content Team"],description:"Review next month's content calendar."}),
  mkEvent({title:"Strategy Session \u2013 Bright Path Co",category:"client",date:d(0),start:"13:30",end:"14:30",attendees:["Bright Path Co"],description:"Quarterly strategy alignment session.",meetingLink:"https://zoom.smk-lab.sim/brightpath",reminder:"15",priority:true}),
  mkEvent({title:"Q1 Campaign Brief Due",category:"deadline",date:d(0),start:"16:00",end:"16:15",description:"Final Q1 campaign brief must be submitted."}),

  // TUESDAY Jan 13 - scheduling / rescheduling practice day (Module 2)
  mkEvent({title:"Client Call \u2013 Whitfield & Sons",category:"client",date:d(1),start:"09:00",end:"10:00",attendees:["Whitfield & Sons"],description:"Monthly performance review call.",meetingLink:"https://meet.smk-lab.sim/whitfield"}),
  mkEvent({title:"Design Review",category:"internal",date:d(1),start:"10:15",end:"11:00",attendees:["Design Team"],description:"Review new landing page designs."}),
  mkEvent({title:"Vendor Check-in",category:"internal",date:d(1),start:"11:30",end:"12:00",attendees:["Ad Vendor Rep"],description:"Check on ad spend delivery."}),

function addLog(msg){
  var now = new Date();
  var t = String(now.getHours()).padStart(2,'0')+":"+String(now.getMinutes()).padStart(2,'0')+":"+String(now.getSeconds()).padStart(2,'0');
  state.log.unshift({t:t,msg:msg});
  if(state.log.length>60) state.log.pop();
}

/* =========================================================
   UTILS
   ========================================================= */
var DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var DOW_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function toMin(hhmm){ var p=hhmm.split(":"); return (+p[0])*60+(+p[1]); }
function fromMin(m){ var h=Math.floor(m/60), mi=m%60; return String(h).padStart(2,'0')+":"+String(mi).padStart(2,'0'); }
function fmt12(hhmm){
  var m = toMin(hhmm); var h = Math.floor(m/60), mi=m%60;
  var ap = h>=12?"PM":"AM"; var hh = h%12; if(hh===0) hh=12;
  return hh+":"+String(mi).padStart(2,'0')+" "+ap;
}
function parseISO(iso){ var p=iso.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function dowIndex(iso){ // 0=Mon..6=Sun
  var jsday = parseISO(iso).getDay(); // 0=Sun..6=Sat
  return jsday===0?6:jsday-1;
}
function addDays(iso,n){ var dt=parseISO(iso); dt.setDate(dt.getDate()+n); return isoDate(dt); }
function fmtDateLong(iso){ var dt=parseISO(iso); return DOW_FULL[dowIndex(iso)]+", "+MONTHS[dt.getMonth()]+" "+dt.getDate()+", "+dt.getFullYear(); }
function fmtDateShort(iso){ var dt=parseISO(iso); return MONTHS[dt.getMonth()].slice(0,3)+" "+dt.getDate(); }

function esToWat(hhmm){ var m=(toMin(hhmm)+6*60)%1440; return fromMin(m); }
function esToGmt(hhmm){ var m=(toMin(hhmm)+5*60)%1440; return fromMin(m); }
function esToPst(hhmm){ var m=(toMin(hhmm)-3*60+1440)%1440; return fromMin(m); }

function sortedDayEvents(iso){
  return EVENTS.filter(function(e){return e.date===iso;}).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
}
function overlaps(aS,aE,bS,bE){ return toMin(aS)<toMin(bE) && toMin(bS)<toMin(aE); }

/* Conflict + preference checker used by both the app UI and audit module */
function analyzeDay(iso){
  var evts = sortedDayEvents(iso);
  var issues = [];
  var meetingCount = evts.filter(function(e){return e.category==="client"||e.category==="internal";}).length;
  if(meetingCount>5){
    issues.push({type:"overload",msg:"Overloaded day: "+meetingCount+" meetings scheduled (max is 5)."});
  }
  for(var i=0;i<evts.length;i++){
    var e = evts[i];
    if((e.category==="client"||e.category==="internal") && toMin(e.start)<toMin("09:00")){
      issues.push({type:"early",id:e.id,msg:'"'+e.title+'" starts before 9:00 AM EST.'});
    }
    if(overlaps(e.start,e.end,"12:30","13:30") && (e.category==="client"||e.category==="internal")){
      issues.push({type:"lunch",id:e.id,msg:'"'+e.title+'" overlaps the protected lunch break (12:30\u20131:30 PM EST).'});
    }
    if(dowIndex(iso)===4 && toMin(e.start)>=toMin("14:00") && (e.category==="client"||e.category==="internal")){
      issues.push({type:"friday",id:e.id,msg:'"'+e.title+'" is scheduled on Friday after 2:00 PM EST.'});
    }
    if((e.category==="client"||e.category==="internal") && !e.description){
      issues.push({type:"nodetail",id:e.id,msg:'"'+e.title+'" is missing an agenda/description.'});
    }
    for(var j=0;j<evts.length;j++){
      if(i===j) continue;
      var f = evts[j];
      if(overlaps(e.start,e.end,f.start,f.end)){
        issues.push({type:"overlap",id:e.id,id2:f.id,msg:'"'+e.title+'" double-books with "'+f.title+'".'});
      } else if(toMin(f.start)>=toMin(e.end) && toMin(f.start)-toMin(e.end)<15 && (e.category==="client"||e.category==="internal") && (f.category==="client"||f.category==="internal")){
        issues.push({type:"buffer",id:e.id,id2:f.id,msg:'Only '+(toMin(f.start)-toMin(e.end))+' min between "'+e.title+'" and "'+f.title+'" (needs 15 min buffer).'});
      }
    }
  }
  // de-dup overlap/buffer pairs (a-b and b-a)
  var seen = {}; var out=[];
  issues.forEach(function(iss){
    var key = iss.type+"|"+(iss.id||"")+"|"+(iss.id2?[iss.id,iss.id2].sort().join(","):"");
    if(!seen[key]){ seen[key]=true; out.push(iss); }
  });
  return out;
}

   ========================================================= */
function calendarHTML(){
  var title;
  if(state.view==="month"){
    title = MONTHS[state.cursor.getMonth()]+" "+state.cursor.getFullYear();
  } else if(state.view==="week"){
    var mon = weekStartOf(state.cursor);
    var sun = addDays(mon,6);
    title = fmtDateShort(mon)+" \u2013 "+fmtDateShort(sun)+", "+state.cursor.getFullYear();
  } else {
    title = fmtDateLong(isoDate(state.cursor));
  }

  var html = '<div class="cal-toolbar">'+
    '<div class="nav-btns">'+
      '<button class="btn btn-sm" id="prevBtn">\u2039</button>'+
      '<button class="btn btn-sm" id="todayBtn">Today</button>'+
      '<button class="btn btn-sm" id="nextBtn">\u203a</button>'+
    '</div>'+
    '<div class="cal-title">'+title+'</div>'+
    '<div class="view-toggle">'+
      ["day","week","month"].map(function(v){
        return '<button class="view-btn '+(state.view===v?"active":"")+'" data-view="'+v+'">'+v.charAt(0).toUpperCase()+v.slice(1)+'</button>';
      }).join("")+
    '</div>'+
  '</div>';

  if(state.view==="month") html += monthGridHTML();
  else if(state.view==="week") html += weekGridHTML();
  else html += dayGridHTML(isoDate(state.cursor));

  return html;
}

function weekStartOf(dateObj){
  var wd = dateObj.getDay(); var diff = wd===0?-6:1-wd;
  var mon = new Date(dateObj); mon.setDate(mon.getDate()+diff);
  return isoDate(mon);
}

var HOURS = []; for(var hh=6; hh<=21; hh++) HOURS.push(hh);
var GRID_START_MIN = 6*60, GRID_END_MIN = 22*60;
var ROW_H = 52; // px per hour

function eventTopHeight(e){
  var top = (toMin(e.start)-GRID_START_MIN)/60*ROW_H;
  var h = (toMin(e.end)-toMin(e.start))/60*ROW_H;
  return {top:Math.max(top,0), height:Math.max(h,20)};
}

function weekGridHTML(){
  var mon = weekStartOf(state.cursor);
  var days = []; for(var i=0;i<7;i++) days.push(addDays(mon,i));
  var todayIso = isoDate(new Date(2026,0,12)); // simulated "today" anchor for highlight

  var head = '<div class="grid-head" style="grid-template-columns:52px repeat(7,1fr);">'+
    '<div class="grid-head-cell"></div>'+
    days.map(function(iso){
      var dt = parseISO(iso);
      return '<div class="grid-head-cell '+(iso===todayIso?"today":"")+'"><span class="dow">'+DOW[dowIndex(iso)]+'</span><span class="dnum">'+dt.getDate()+'</span></div>';
    }).join("")+
  '</div>';

  var body = '<div class="grid-body" style="grid-template-columns:52px repeat(7,1fr);">'+
    '<div class="time-col">'+HOURS.map(function(h){return '<div class="time-slot">'+fmtHourLabel(h)+'</div>';}).join("")+'</div>'+
    days.map(function(iso){
      return dayColumnHTML(iso);
    }).join("")+
  '</div>';

  return '<div class="grid-wrap">'+head+body+'</div>';
}

function dayGridHTML(iso){
  var head = '<div class="grid-head" style="grid-template-columns:52px 1fr;">'+
    '<div class="grid-head-cell"></div>'+
    '<div class="grid-head-cell today"><span class="dow">'+DOW[dowIndex(iso)]+'</span><span class="dnum">'+parseISO(iso).getDate()+'</span></div>'+
  '</div>';
  var body = '<div class="grid-body" style="grid-template-columns:52px 1fr;">'+
    '<div class="time-col">'+HOURS.map(function(h){return '<div class="time-slot">'+fmtHourLabel(h)+'</div>';}).join("")+'</div>'+
    dayColumnHTML(iso)+
  '</div>';
  return '<div class="grid-wrap">'+head+body+'</div>';
}

function fmtHourLabel(h){
  var ap = h>=12?"PM":"AM"; var hh=h%12; if(hh===0) hh=12; return hh+" "+ap;
}

function dayColumnHTML(iso){
  var rows = HOURS.map(function(h){
    var isLunch = h===12;
    return '<div class="hour-line '+(isLunch?"lunch":"")+'" data-date="'+iso+'" data-hour="'+h+'"></div>';
  }).join("");
  var evts = sortedDayEvents(iso);
  var issues = analyzeDay(iso);
  var conflictIds = {}; issues.forEach(function(is){ if(is.type==="overlap"||is.type==="buffer"){conflictIds[is.id]=true; if(is.id2) conflictIds[is.id2]=true;} });
  var evtHtml = evts.map(function(e){
    var pos = eventTopHeight(e);
    var cls = "evt evt-"+e.category+(e.priority?" priority":"")+(conflictIds[e.id]?" conflict":"");
    return '<div class="'+cls+'" style="top:'+pos.top+'px;height:'+pos.height+'px;" data-evtid="'+e.id+'">'+
      '<b>'+(e.priority?'\u2605 ':'')+esc(e.title)+'</b><span class="t">'+fmt12(e.start)+' \u2013 '+fmt12(e.end)+'</span>'+
    '</div>';
  }).join("");
  return '<div class="day-col" style="height:'+(HOURS.length*ROW_H)+'px;">'+rows+evtHtml+'</div>';
}

function monthGridHTML(){
  var y = state.cursor.getFullYear(), m = state.cursor.getMonth();
  var first = new Date(y,m,1);
  var startIso = weekStartOf(first);
  var cells = [];
  for(var i=0;i<42;i++){
    var iso = addDays(startIso,i);
    var dt = parseISO(iso);
    cells.push(iso);
  }
  var head = '<div class="grid-head" style="grid-template-columns:repeat(7,1fr);">'+
    DOW.map(function(w){return '<div class="grid-head-cell"><span class="dow">'+w+'</span></div>';}).join("")+
  '</div>';

  var todayIso = isoDate(new Date(2026,0,12));

  var body = '<div class="month-grid">'+ cells.map(function(iso){
    var dt = parseISO(iso);
    var other = dt.getMonth()!==m;
    var evts = sortedDayEvents(iso);
    var shown = evts.slice(0,3);
    var extra = evts.length-shown.length;
    return '<div class="month-cell '+(other?"otherm":"")+'" data-date="'+iso+'">'+
      '<div class="month-daynum '+(iso===todayIso?"today":"")+'">'+dt.getDate()+'</div>'+
      shown.map(function(e){return '<div class="month-evt evt-'+e.category+'" data-evtid="'+e.id+'">'+(e.priority?"\u2605 ":"")+esc(e.title)+'</div>';}).join("")+
      (extra>0? '<div class="month-more">+'+extra+' more</div>':'')+
    '</div>';
  }).join("")+'</div>';

  return '<div class="grid-wrap">'+head+body+'</div>';
}

function saveEventFromForm(existingId){
  var title = document.getElementById("fTitle").value.trim();
  var category = document.getElementById("fCategory").value;
  var date = document.getElementById("fDate").value;
  var start = document.getElementById("fStart").value;
  var end = document.getElementById("fEnd").value;
  var priority = document.getElementById("fPriority").checked;
  var location = document.getElementById("fLocation").value.trim();
  var attendees = document.getElementById("fAttendees").value.split(",").map(function(s){return s.trim();}).filter(Boolean);
  var description = document.getElementById("fDescription").value.trim();
  var meetingLink = document.getElementById("fLink").value.trim();
  var reminder = document.getElementById("fReminder").value;
  var recurring = document.getElementById("fRecurring").value;

  var alertEl = document.getElementById("formAlert");
  if(!title || !date || !start || !end || toMin(end)<=toMin(start)){
    alertEl.innerHTML = '<div class="alert alert-danger">Please enter a title and a valid time range (end must be after start).</div>';
    return;
  }

  var draft = {id:existingId||("e"+(uidc++)), isSeed:false, title:title, category:category, date:date, start:start, end:end,
    priority:priority, location:location, attendees:attendees, description:description, meetingLink:meetingLink, reminder:reminder, recurring:recurring};

  // Check conflicts against other events that day (excluding self)
  var others = sortedDayEvents(date).filter(function(e){return e.id!==draft.id;});
  var warnings = [];
  others.forEach(function(o){
    if(overlaps(draft.start,draft.end,o.start,o.end)) warnings.push('Overlaps with "'+o.title+'" ('+fmt12(o.start)+'\u2013'+fmt12(o.end)+').');
  });
  if((category==="client"||category==="internal")){
    if(toMin(start)<toMin("09:00")) warnings.push("Starts before 9:00 AM EST \u2014 outside client's allowed hours.");
    if(overlaps(start,end,"12:30","13:30")) warnings.push("Overlaps the client's protected lunch break.");
    if(dowIndex(date)===4 && toMin(start)>=toMin("14:00")) warnings.push("This is a Friday meeting after 2:00 PM EST.");
    if(!description) warnings.push("No agenda/description added \u2014 client prefers agendas for important meetings.");
  }
  var meetingCountAfter = others.filter(function(e){return e.category==="client"||e.category==="internal";}).length + ((category==="client"||category==="internal")?1:0);
  if(meetingCountAfter>5) warnings.push("This day will have "+meetingCountAfter+" meetings, exceeding the 5-meeting daily limit.");

  if(warnings.length){
    alertEl.innerHTML = '<div class="alert alert-warn"><div>&#9888;<div><strong>Heads up \u2014 this may break a client preference:</strong><ul>'+
      warnings.map(function(w){return "<li>"+w+"</li>";}).join("")+
      '</ul>Click Create/Save again to confirm anyway, or adjust the details.</div></div></div>';
    if(!draft._confirmOnce){
      draft._confirmOnce = true;
      // store pending state on the button so a second click confirms
      var btn = document.getElementById("mSave");
      btn.textContent = "Confirm Anyway";
      btn.onclick = function(){ commitEvent(existingId, draft); };
      return;
    }
  }
  commitEvent(existingId, draft);
}

function commitEvent(existingId, draft){
  delete draft._confirmOnce;
  if(existingId){
    var idx = EVENTS.findIndex(function(e){return e.id===existingId;});
    var wasSeed = EVENTS[idx].isSeed;
    draft.isSeed = wasSeed; // preserve seed flag on edit
    EVENTS[idx] = draft;
    addLog("Edited event: "+draft.title);
  } else {
    EVENTS.push(draft);
    addLog("Created event: "+draft.title+" on "+fmtDateShort(draft.date));
  }
  closeModal();
  renderMain();
  refreshTaskAutoChecks();
}

function wireMainEvents(){
  if(state.tab==="calendar"){
    var prev = document.getElementById("prevBtn");
    var next = document.getElementById("nextBtn");
    var today = document.getElementById("todayBtn");
    if(prev) prev.onclick = function(){ shiftCursor(-1); };
    if(next) next.onclick = function(){ shiftCursor(1); };
    if(today) today.onclick = function(){ state.cursor = new Date(2026,0,12); renderMain(); };
    document.querySelectorAll(".view-btn").forEach(function(b){
      b.onclick = function(){ state.view = b.getAttribute("data-view"); renderMain(); };
    });
    document.querySelectorAll(".evt, .month-evt").forEach(function(elx){
      elx.addEventListener("click", function(ev){
        ev.stopPropagation();
        var id = elx.getAttribute("data-evtid");
        var evt = EVENTS.find(function(e){return e.id===id;});
        if(evt) openEventModal({event:evt});
      });
    });
    document.querySelectorAll(".hour-line").forEach(function(elx){
      elx.addEventListener("click", function(){
        var date = elx.getAttribute("data-date");
        var hour = +elx.getAttribute("data-hour");
        openEventModal({prefill:{date:date, start:String(hour).padStart(2,'0')+":00", end:String(hour).padStart(2,'0')+":30"}});
      });
    });
    document.querySelectorAll(".month-cell").forEach(function(elx){
      elx.addEventListener("click", function(ev){
        if(ev.target.closest(".month-evt")) return;
        var date = elx.getAttribute("data-date");
        state.cursor = parseISO(date);
        state.view = "day";
        renderMain();
      });
    });
  } else if(state.tab==="modules"){
    wireModuleEvents();
  } else if(state.tab==="inbox"){
    wireInboxEvents();
  }
}

function shiftCursor(dir){
  var dt = new Date(state.cursor);
  if(state.view==="month") dt.setMonth(dt.getMonth()+dir);
  else if(state.view==="week") dt.setDate(dt.getDate()+dir*7);
  else dt.setDate(dt.getDate()+dir);
  state.cursor = dt;
  renderMain();
}

function totalPossiblePoints(){
  var t=0; MODULES.forEach(function(m){ m.tasks.forEach(function(tk){ t+=tk.points; }); });
  return t;
}
function earnedPoints(){
  var t=0;
  MODULES.forEach(function(m){
    m.tasks.forEach(function(tk){
      var r = state.taskResults[tk.id];
      if(r && r.pass) t+=tk.points;
    });
  });
  return t;
}
function modulePercent(m){
  var total=0, earned=0;
  m.tasks.forEach(function(tk){ total+=tk.points; var r=state.taskResults[tk.id]; if(r&&r.pass) earned+=tk.points; });
  return total? Math.round(earned/total*100):0;
}

function wireModuleEvents(){
  document.querySelectorAll("[data-headid]").forEach(function(elx){
    elx.onclick = function(){
      var id = +elx.getAttribute("data-headid");
      state.openModuleId = (state.openModuleId===id)? null : id;
      renderMain();
    };
  });
  document.querySelectorAll("[data-multi]").forEach(function(elx){
    elx.onchange = function(){
      var tid = elx.getAttribute("data-multi");
      var arr = state.quizAnswers[tid] || [];
      var v = +elx.value;
      if(elx.checked){ if(arr.indexOf(v)<0) arr.push(v); } else { arr = arr.filter(function(x){return x!==v;}); }
      state.quizAnswers[tid] = arr;
    };
  });
  document.querySelectorAll('input[type=radio][name^="q_"]').forEach(function(elx){
    elx.onchange = function(){
      var tid = elx.name.slice(2);
      state.quizAnswers[tid] = +elx.value;
    };
  });
  document.querySelectorAll("[data-checktask]").forEach(function(elx){
    elx.onclick = function(){
      var tid = elx.getAttribute("data-checktask");
      var tk = findTask(tid);
      var result;
      if(tk.type==="auto"){
        result = tk.check();
      } else if(tk.type==="quiz" && !tk.multi){
        var ans = state.quizAnswers[tid];
        if(ans===undefined){ alert("Please select an answer first."); return; }
        result = ans===tk.correct ? {pass:true, detail:"Correct!"} : {pass:false, detail:"Not quite \u2014 review the time zone math and try again."};
      } else if(tk.type==="quiz" && tk.multi){
        var sel = (state.quizAnswers[tid]||[]).slice().sort();
        var correct = tk.correctSet.slice().sort();
        var match = sel.length===correct.length && sel.every(function(v,i){return v===correct[i];});
        result = match ? {pass:true, detail:"Correct \u2014 you caught every real issue."} : {pass:false, detail:"Not quite right \u2014 double-check Wednesday's calendar and try again."};
      }
      state.taskResults[tid] = result;
      addLog((result.pass?"Passed":"Attempted")+" task: "+tk.title);
      renderMain();
    };
  });
}
function findTask(id){
  for(var i=0;i<MODULES.length;i++){
    for(var j=0;j<MODULES[i].tasks.length;j++){
      if(MODULES[i].tasks[j].id===id) return MODULES[i].tasks[j];
    }
  }
  return null;
}
function refreshTaskAutoChecks(){
  // silently re-evaluate already-attempted auto tasks so status stays accurate
  MODULES.forEach(function(m){
    m.tasks.forEach(function(tk){
      if(tk.type==="auto" && state.taskResults[tk.id]){
        state.taskResults[tk.id] = tk.check();
      }
    });
  });
}

  {id:"m2", from:"Sarah Williams", subject:"Wednesday looks packed \u2014 can you take a look?",
   body:"My Wednesday feels really overloaded and I'm worried something's double-booked. Can you review it and clean it up? Use the Calendar Audit module if you want a checklist."},
  {id:"m3", from:"Sarah Williams", subject:"Weekly team meeting \u2014 make it recurring",
   body:"Can you set up our team meeting to repeat every week going forward instead of me asking you to add it manually each time? Internal meeting, needs a short agenda."},
  {id:"m4", from:"Sarah Williams", subject:"This week's full schedule \u2014 final check",
   body:"Before the week starts, can you do a full pass on my calendar? Make sure nothing overlaps, no day has more than 5 meetings, and Friday afternoon stays free after 2 PM. This is the final check before I head into the week \u2014 treat it like the real thing."}
];

function inboxHTML(){
  var html = '<div class="panel-title">Client Inbox</div><div class="panel-sub">Messages from Sarah Williams \u2014 open one and turn it into calendar action.</div>';
  html += '<div class="inbox-list">'+ INBOX.map(function(m){
    var read = state.inboxReadIds[m.id];
    return '<div class="inbox-item '+(read?"read":"")+'" data-inboxid="'+m.id+'">'+
      '<div class="inbox-avatar">SW</div>'+
      '<div><div class="inbox-from">'+esc(m.from)+'</div><div class="inbox-subject">'+esc(m.subject)+'</div></div>'+
    '</div>';
  }).join("") + '</div>';

  if(state.activeInboxId){
    var m = INBOX.find(function(x){return x.id===state.activeInboxId;});
    html += '<div class="inbox-detail"><div style="font-weight:700;font-size:14px;margin-bottom:6px;">'+esc(m.subject)+'</div>'+
      '<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px;">From '+esc(m.from)+'</div>'+
      '<div style="font-size:13.5px;line-height:1.6;">'+esc(m.body)+'</div>'+
      '<div style="margin-top:14px;"><button class="btn btn-primary btn-sm" id="gotoCal">Open Calendar</button></div>'+
    '</div>';
  }
  return html;
}
function wireInboxEvents(){
  document.querySelectorAll("[data-inboxid]").forEach(function(elx){
    elx.onclick = function(){
      var id = elx.getAttribute("data-inboxid");
      state.inboxReadIds[id]=true;
      state.activeInboxId=id;
      renderMain();
    };
  });
  var goto = document.getElementById("gotoCal");
  if(goto) goto.onclick = function(){ setTab("calendar"); };
}

/* =========================================================
   PROGRESS
   ========================================================= */
function progressHTML(){
  var earned = earnedPoints(), total = totalPossiblePoints();
  var pct = total? Math.round(earned/total*100):0;
  var r=52, c=2*Math.PI*r;
  var offset = c - (pct/100)*c;
  var level = pct>=90?"VA-Ready \u2b50":pct>=70?"Strong Progress":pct>=40?"Building Skills":"Just Getting Started";

  var html = '<div class="panel-title">My Progress</div><div class="panel-sub">Your overall readiness score across all training modules.</div>';

  html += '<div class="gauge-wrap">'+
    '<svg width="130" height="130" viewBox="0 0 130 130">'+
      '<circle cx="65" cy="65" r="'+r+'" stroke="#eef2f9" stroke-width="12" fill="none"/>'+
      '<circle cx="65" cy="65" r="'+r+'" stroke="#0b8f8f" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 65 65)"/>'+
      '<text x="65" y="60" text-anchor="middle" class="gauge-num" style="font-size:24px;">'+pct+'%</text>'+
      '<text x="65" y="78" text-anchor="middle" class="gauge-num" style="font-size:10px;fill:#5f6478;">'+earned+' / '+total+' pts</text>'+
    '</svg>'+
    '<div><div style="font-family:var(--font-display);font-weight:700;font-size:17px;">'+level+'</div>'+
      '<div style="color:var(--muted);font-size:13px;max-width:340px;">Complete tasks across all 7 modules to raise your score. Switch to Advanced Mode once you\u2019re comfortable to practice without hints.</div></div>'+
  '</div>';

  html += '<div class="progress-modules">'+ MODULES.map(function(m){
    var pctm = modulePercent(m);
    return '<div class="pm-card"><div class="pm-title">Module '+m.id+': '+m.title+'</div>'+
      '<div class="pm-bar"><div class="pm-bar-fill" style="width:'+pctm+'%;"></div></div>'+
      '<div class="pm-pct">'+pctm+'% complete</div></div>';
  }).join("") + '</div>';

  html += '<div style="margin-top:20px;"><div style="font-weight:700;font-size:13px;margin-bottom:8px;">Activity Log</div>'+
    '<div class="log-feed">'+ (state.log.length? state.log.map(function(l){return '<div class="lg-line"><span class="lg-time">'+l.t+'</span>'+esc(l.msg)+'</div>';}).join("") : '<div class="empty-note">No activity yet \u2014 create or edit an event to get started.</div>') +'</div></div>';

  return html;
}

/* =========================================================
   TOP-LEVEL WIRING
   ========================================================= */
function setTab(tab){
  state.tab = tab;
  document.querySelectorAll(".tab-btn").forEach(function(b){
    b.classList.toggle("active", b.getAttribute("data-tab")===tab);
  });
  renderMain();
}

document.getElementById("mainTabs").addEventListener("click", function(e){
  var btn = e.target.closest(".tab-btn");
  if(btn) setTab(btn.getAttribute("data-tab"));
});

document.getElementById("modeSwitch").addEventListener("click", function(){
  state.mode = state.mode==="beginner" ? "advanced" : "beginner";
  document.getElementById("modeSwitch").classList.toggle("on", state.mode==="advanced");
  document.getElementById("modeLabel").textContent = state.mode==="beginner"?"Beginner Mode":"Advanced Mode";
  if(state.tab==="modules") renderMain();
});

document.getElementById("newEventBtn").addEventListener("click", function(){
  openEventModal({prefill:{date:isoDate(state.cursor)}});
});

document.getElementById("modalBackdrop").addEventListener("click", function(e){
  if(e.target.id==="modalBackdrop") closeModal();
});

/* =========================================================
   INIT
   ========================================================= */
renderSidebar();
renderMain();
addLog("Welcome to the SMK Calendar Management Practice Lab.");

})();
</script>
</body>
</html>
