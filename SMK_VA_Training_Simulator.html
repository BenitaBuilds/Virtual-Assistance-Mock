<title>SMK Virtual Assistant Training Simulator</title>
<style>
:root{
  --navy:#0b2447;
  --navy-light:#14335f;
  --gold:#c9a227;
  --gold-light:#e0c25e;
  --teal:#12746b;
  --teal-light:#1a9c8f;
  --cream:#f7f5ef;
  --ink:#1c2530;
  --line:#d8d2c2;
  --danger:#a4342a;
  --good:#1a7a4c;
}
*{box-sizing:border-box;}
body{

  background:var(--cream);
  color:var(--ink);

}
header.app-header{

  display:flex;
  justify-content:space-between;

}
header.app-header .brand{

}
header.app-header .brand .name{
  font-size:22px;
  font-weight:700;
  letter-spacing:0.5px;
}
header.app-header .brand .tag{
  font-size:12.5px;
  color:var(--gold-light);
  margin-top:2px;
}
header.app-header .status{
  font-size:13px;
  text-align:right;
  color:#dfe6f0;
}
#facilitator-badge{

  background:var(--gold);

  font-weight:700;
  font-size:11px;
  padding:3px 9px;
  border-radius:10px;
  margin-left:8px;
}
main{
  max-width:960px;
  margin:0 auto;
  padding:26px 20px 70px;
}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(11,36,71,0.06);
}
h1,h2,h3{color:var(--navy);}
h2.section-title{
  border-left:5px solid var(--teal);
  padding-left:12px;
  margin-top:0;
}
.pill{
  display:inline-block;
  padding:3px 11px;
  border-radius:12px;
  font-size:12px;
  font-weight:600;
  background:var(--teal);
  color:#fff;
}
.pill.gold{background:var(--gold);color:var(--navy);}
button.btn{
  background:var(--teal);
  color:#fff;
  border:none;
  padding:11px 22px;
  border-radius:6px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:background 0.15s;
}
button.btn:hover{background:var(--teal-light);}
button.btn.secondary{
  background:transparent;
  color:var(--navy);
  border:1.5px solid var(--navy);
}
button.btn.secondary:hover{background:var(--navy);color:#fff;}
button.btn.gold{background:var(--gold);color:var(--navy);}
button.btn.gold:hover{background:var(--gold-light);}
button.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.module-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}
.module-card{
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px;
  background:#fff;
  cursor:pointer;
  transition:transform 0.12s, box-shadow 0.12s;
}
.module-card:hover{

  box-shadow:0 6px 14px rgba(11,36,71,0.12);

.module-card h3{margin:8px 0 4px;font-size:16.5px;}
.module-card p{margin:0;font-size:13px;color:#555;}
.module-card .marks{

  margin-top:8px;

  color:var(--navy);

  border:1.5px solid var(--line);

textarea{resize:vertical;min-height:90px;}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---------- keyword grading helper (fixes past stopword bugs: whole-word match, no over-stripping) ---------- */
function keywordScore(text, keywordGroups, maxMarks){
  // keywordGroups: array of arrays; each inner array is a set of acceptable synonyms for ONE required concept
  const t = (text||'').toLowerCase();
  let hits = 0;
  keywordGroups.forEach(group=>{
    const found = group.some(kw=>{
      const lower = kw.toLowerCase();
      const escaped = lower.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      // only anchor a side with \b if that side is actually a word character;
      // otherwise \b can never match (e.g. a phone number starting with "+")
      const startsWord = /\w/.test(lower[0]);
      const endsWord = /\w/.test(lower[lower.length-1]);
      const pattern = (startsWord?'\\b':'') + escaped + (endsWord?'\\b':'');
      const re = new RegExp(pattern,'i');
      return re.test(t);
    });
    if(found) hits++;
  });
  const score = Math.round((hits/keywordGroups.length)*maxMarks*10)/10;
  return { score, hits, total:keywordGroups.length };
}

function fieldMatch(input, correct, mode){
  if(input==null) input='';
  const a = input.trim().toLowerCase();
  const b = correct.trim().toLowerCase();
  if(mode==='digits'){
    return a.replace(/\D/g,'') === b.replace(/\D/g,'');
  }
  if(mode==='loose'){
    return a.replace(/[^a-z0-9]/g,'') === b.replace(/[^a-z0-9]/g,'');
  }
  return a === b;
}

function render(){
  facilitatorBadge.style.display = state.facilitatorMode ? 'inline-block' : 'none';

  if(state.mode==='practice-hub') return renderPracticeHub();

  if(state.mode==='exam-intro') return renderExamIntro();
  if(state.mode==='exam') return renderExamModule();
  if(state.mode==='results') return renderResults();
  if(state.mode==='certificate') return renderCertificate();
}

function toggleFacilitator(){
  if(state.facilitatorMode){
    state.facilitatorMode = false;
    render();
    return;
  }
  const pw = prompt("Enter facilitator password:");
  if(pw === FACILITATOR_PASSWORD){
    state.facilitatorMode = true;
    render();
  } else if(pw !== null){
    alert("Incorrect password.");
  }
}

  setMode('practice-module');

    <div class="top-nav"><a onclick="goMenu()">&larr; Back to menu</a><span class="pill">Practice Mode</span></div>
    <div class="card">
      <h2 class="section-title">Choose a skill to practice</h2>
      <p class="small-note">Practice mode does not affect your certification score. Repeat as many times as you like.</p>
      <div class="module-grid">
        ${MODULES.map(m=>`
          <div class="module-card" onclick="startPractice('${m.id}')">
            <div class="icon">${m.icon}</div>
            <h3>${m.name}</h3>
            <p>${m.desc}</p>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function goMenu(){ state.mode='menu'; render(); }

function startPractice(moduleId){
  state.practiceModuleId = moduleId;
  state.practiceAttempt = 0;
  state.mode = 'practice-module';
  render();
}

function renderPracticeModule(){
  const m = MODULES.find(x=>x.id===state.practiceModuleId);
  app.innerHTML = `<div class="top-nav"><a onclick="goPracticeHub()">&larr; All practice modules</a><span class="pill">Practice: ${m.name}</span></div><div id="module-slot"></div>`;
  renderModuleBody('practice', m.id, document.getElementById('module-slot'));
}

/* ============================================================
   GENERIC MODULE ROUTER
   ============================================================ */
function renderModuleBody(mode, moduleId, container){
  if(moduleId==='calendar')  return moduleCalendar(mode, container);
  if(moduleId==='email')     return moduleEmail(mode, container);
  if(moduleId==='dataentry') return moduleDataEntry(mode, container);
  if(moduleId==='asana')     return moduleAsana(mode, container);
  if(moduleId==='signature') return moduleSignature(mode, container);
  if(moduleId==='notes')     return moduleNotes(mode, container);
}

function moduleFooter(mode, onSubmitLabel, onSubmit){
  if(mode==='practice'){
    return `<div class="btn-row">
      <button class="btn" id="mod-check-btn">Check My Answers</button>
      <button class="btn secondary" id="mod-retry-btn">Try a Fresh Set</button>
    </div>
    <div id="mod-feedback"></div>`;
  }
  return `<div class="btn-row"><button class="btn gold" id="mod-check-btn">${onSubmitLabel||'Submit & Continue'}</button></div>
  <div id="mod-feedback"></div>`;
}

/* ============================================================
   MODULE: CALENDAR
   ============================================================ */
function moduleCalendar(mode, container){
  const qs = shuffle(CALENDAR_QUESTIONS).slice(0, mode==='exam' ? 5 : 3);
  const optionOrders = qs.map(q=>shuffle(q.options));

  container.innerHTML = `
    <div class="card">
      <h2 class="section-title">Google Calendar Management</h2>
      <p class="small-note">You are managing Dr. Sandra's Google Calendar. Read each scenario carefully, including time zones and buffer rules.</p>
      ${qs.map((q,i)=>`
        <div class="scenario-box">${q.scenario}</div>
        <div id="cal-q-${i}">
          ${optionOrders[i].map((opt,oi)=>`
            <label style="display:block;margin:6px 0;cursor:pointer;">
              <input type="radio" name="cal-${i}" value="${encodeURIComponent(opt)}"> ${opt}
            </label>
          `).join('')}
        </div>
        <hr style="border:none;border-top:1px solid var(--line);margin:16px 0;">
      `).join('')}
      ${moduleFooter(mode)}
    </div>
  `;

  attachCommon(mode, container, ()=>{
    let score = 0, max = 0, detailLines = [];
    qs.forEach((q,i)=>{
      max += 5;
      const sel = container.querySelector(`input[name="cal-${i}"]:checked`);
      const val = sel ? decodeURIComponent(sel.value) : null;
      const ok = val === q.correct;
      if(ok) score += 5;
      if(mode==='practice'){
        detailLines.push(`<div class="feedback ${ok?'correct':'incorrect'}"><strong>Q${i+1}:</strong> ${ok?'Correct.':'Not quite.'} ${q.explain}</div>`);
      }
    });
    return { score, max, html: detailLines.join('') };
  }, ()=>startPractice('calendar'));
}

/* ============================================================
   MODULE: EMAIL
   ============================================================ */
function moduleEmail(mode, container){
  const sortItems = shuffle(EMAIL_SORT_ITEMS);
  const draftItems = mode==='exam' ? EMAIL_DRAFT_SCENARIOS : [EMAIL_DRAFT_SCENARIOS[0]];

  container.innerHTML = `
    <div class="card">
      <h2 class="section-title">Email Management &amp; Filtering</h2>
      <h3>Part A &mdash; Sort the inbox</h3>
      <p class="small-note">Assign each email to the correct folder.</p>
      ${sortItems.map((e,i)=>`
        <div class="inbox-row">
          <div class="meta"><div class="subj">${e.subject}</div><div class="from">From: ${e.from}</div></div>
          <select id="sort-${i}">
            <option value="">Choose folder...</option>
            ${EMAIL_FOLDERS.map(f=>`<option value="${f}">${f}</option>`).join('')}
          </select>
        </div>
      `).join('')}
      <h3 style="margin-top:22px;">Part B &mdash; Draft a reply</h3>
      ${draftItems.map((d,i)=>`
        <div class="scenario-box"><strong>${d.title}</strong><br>${d.scenario}</div>
        <textarea id="draft-${i}" placeholder="Type your reply..."></textarea>
      `).join('')}
      ${moduleFooter(mode)}
    </div>
  `;

  attachCommon(mode, container, ()=>{
    let score = 0, max = 0, detailLines = [];
    sortItems.forEach((e,i)=>{
      max += 2;
      const sel = container.querySelector(`#sort-${i}`).value;
      const ok = sel === e.correct;
      if(ok) score += 2;
      if(mode==='practice'){
        detailLines.push(`<div class="feedback ${ok?'correct':'incorrect'}">"${e.subject}" &rarr; correct folder: <strong>${e.correct}</strong>${ok?' (you got it right)':''}</div>`);
      }
    });
    draftItems.forEach((d,i)=>{
      const text = container.querySelector(`#draft-${i}`).value;
      const res = keywordScore(text, d.keywordGroups, d.maxMarks);
      score += res.score; max += d.maxMarks;
      if(mode==='practice'){
        detailLines.push(`<div class="feedback ${res.hits===res.total?'correct':res.hits>0?'partial':'incorrect'}"><strong>${d.title}:</strong> covered ${res.hits}/${res.total} key elements a strong reply should include (score ${res.score}/${d.maxMarks}).</div>`);
      }
    });
    return { score, max, html: detailLines.join('') };
  }, ()=>startPractice('email'));
}

/* ============================================================
   MODULE: DATA ENTRY
   ============================================================ */
function moduleDataEntry(mode, container){
  const records = mode==='exam' ? DATA_ENTRY_RECORDS : [DATA_ENTRY_RECORDS[Math.floor(Math.random()*DATA_ENTRY_RECORDS.length)]];
  const perField = [1,2,1,1]; // name,email,phone,date out of 5 per record

  container.innerHTML = `
    <div class="card">
      <h2 class="section-title">Data Entry</h2>
      <p class="small-note">Below is a messy source record. Enter it cleanly and correctly into the fields.</p>
      ${records.map((r,ri)=>`
        <div class="scenario-box">${r.source}</div>
        <div class="form-grid">
          ${r.fields.map((f,fi)=>`
            <div>
              <label class="field-label">${f.label}</label>
              <input type="text" id="de-${ri}-${fi}">
            </div>
          `).join('')}
        </div>
        <hr style="border:none;border-top:1px solid var(--line);margin:16px 0;">
      `).join('')}
      ${moduleFooter(mode)}
    </div>
  `;

  attachCommon(mode, container, ()=>{
    let score = 0, max = 0, detailLines = [];
    records.forEach((r,ri)=>{
      r.fields.forEach((f,fi)=>{
        const pts = perField[fi];
        max += pts;
        const val = container.querySelector(`#de-${ri}-${fi}`).value;
        const correctVal = f.mode==='digits' ? f.correctDigits : f.correct;
        const ok = fieldMatch(val, correctVal, f.mode);
        if(ok) score += pts;
        if(mode==='practice'){
          detailLines.push(`<div class="feedback ${ok?'correct':'incorrect'}">${f.label}: expected <strong>${f.correct}</strong>${ok?' &mdash; correct':' &mdash; check formatting/spelling'}</div>`);
        }
      });
    });
    return { score, max, html: detailLines.join('') };
  }, ()=>startPractice('dataentry'));
}

/* ============================================================
   MODULE: ASANA
   ============================================================ */
function moduleAsana(mode, container){
  const scenarios = mode==='exam' ? ASANA_SCENARIOS : [ASANA_SCENARIOS[Math.floor(Math.random()*ASANA_SCENARIOS.length)]];

  container.innerHTML = `
    <div class="card">
      <h2 class="section-title">Asana Task Management</h2>
      <p class="small-note">Read each request and create the task correctly: name, assignee, and due date.</p>
      ${scenarios.map((s,i)=>`
        <div class="scenario-box">${s.request}</div>
        <div class="form-grid">
          <div><label class="field-label">Task Name</label><input type="text" id="asana-name-${i}"></div>
          <div><label class="field-label">Assignee</label><input type="text" id="asana-assignee-${i}"></div>
          <div class="full"><label class="field-label">Due Date</label><input type="text" id="asana-due-${i}" placeholder="e.g. Friday, or 18th, or end of this week"></div>
        </div>
        <hr style="border:none;border-top:1px solid var(--line);margin:16px 0;">
      `).join('')}
      ${moduleFooter(mode)}
    </div>
  `;

  attachCommon(mode, container, ()=>{
    let score = 0, max = 0, detailLines = [];
    scenarios.forEach((s,i)=>{
      max += 5;
      const name = container.querySelector(`#asana-name-${i}`).value;
      const assignee = container.querySelector(`#asana-assignee-${i}`).value;
      const due = container.querySelector(`#asana-due-${i}`).value;
      let pts = 0;
      const nameOk = fieldMatch(name, s.correct.name, 'loose') ||
        s.correct.name.toLowerCase().split(' ').every(w=>name.toLowerCase().includes(w));
      const assigneeOk = fieldMatch(assignee, s.correct.assignee, 'loose');
      const dueWords = s.correct.due.toLowerCase().split(' ').filter(w=>!['the','this','of'].includes(w));
      const dueOk = due.toLowerCase().includes(s.correct.due.toLowerCase()) ||
        fieldMatch(due, s.correct.due, 'loose') ||
        dueWords.every(w=>due.toLowerCase().includes(w));
      if(nameOk) pts += 2;
      if(assigneeOk) pts += 1.5;
      if(dueOk) pts += 1.5;
      score += pts;
      if(mode==='practice'){
        detailLines.push(`<div class="feedback ${pts===5?'correct':pts>0?'partial':'incorrect'}">Expected task: <strong>${s.correct.name}</strong>, assignee <strong>${s.correct.assignee}</strong>, due <strong>${s.correct.due}</strong>. You scored ${pts}/5.</div>`);
      }
    });
    return { score, max, html: detailLines.join('') };
  }, ()=>startPractice('asana'));
}

/* ============================================================
   MODULE: EMAIL SIGNATURE
   ============================================================ */
function moduleSignature(mode, container){
  container.innerHTML = `
    <div class="card">
      <h2 class="section-title">Email Signature Builder</h2>
      <p class="small-note">Use the details below to build a complete, professional email signature.</p>
      <div class="scenario-box">Name: ${SIGNATURE_INFO.name}
Title: ${SIGNATURE_INFO.title}
Company: ${SIGNATURE_INFO.company}
Phone: ${SIGNATURE_INFO.phone}
Email: ${SIGNATURE_INFO.email}
Website: ${SIGNATURE_INFO.website}</div>
      <label class="field-label">Your Signature</label>
      <textarea id="sig-input" style="min-height:150px;" placeholder="Build the signature here..."></textarea>
      ${moduleFooter(mode)}
    </div>
  `;

  attachCommon(mode, container, ()=>{
    const text = container.querySelector('#sig-input').value;
    const groups = [
      [SIGNATURE_INFO.name],
      [SIGNATURE_INFO.title],
      [SIGNATURE_INFO.company],
      [SIGNATURE_INFO.phone],
      [SIGNATURE_INFO.email],
      [SIGNATURE_INFO.website]
    ];
    const res = keywordScore(text, groups, 10);
    let html = '';
    if(mode==='practice'){
      html = `<div class="feedback ${res.hits===res.total?'correct':res.hits>0?'partial':'incorrect'}">Your signature includes ${res.hits}/${res.total} required elements (name, title, company, phone, email, website). Score: ${res.score}/10.</div>`;
    }
    return { score: res.score, max: 10, html };
  }, ()=>startPractice('signature'));
}

/* ============================================================
   MODULE: MEETING NOTES & ITINERARY
   ============================================================ */
function moduleNotes(mode, container){
  container.innerHTML = `
    <div class="card">
      <h2 class="section-title">Meeting Notes &amp; Itinerary</h2>
      <h3>Part A &mdash; Meeting Notes</h3>
      <div class="scenario-box">${NOTES_SCENARIO.transcript}</div>
      <label class="field-label">Write your meeting notes</label>
      <textarea id="notes-input" style="min-height:120px;"></textarea>

      <h3 style="margin-top:22px;">Part B &mdash; Itinerary</h3>
      <div class="scenario-box">${ITINERARY_SCENARIO.details}</div>
      <label class="field-label">Write the itinerary</label>
      <textarea id="itin-input" style="min-height:120px;"></textarea>

      ${moduleFooter(mode)}
    </div>
  `;

  attachCommon(mode, container, ()=>{
    const notesText = container.querySelector('#notes-input').value;
    const itinText = container.querySelector('#itin-input').value;
    const r1 = keywordScore(notesText, NOTES_SCENARIO.keywordGroups, NOTES_SCENARIO.maxMarks);
    const r2 = keywordScore(itinText, ITINERARY_SCENARIO.keywordGroups, ITINERARY_SCENARIO.maxMarks);
    let html = '';
    if(mode==='practice'){
      html = `<div class="feedback ${r1.hits===r1.total?'correct':r1.hits>0?'partial':'incorrect'}">Meeting notes covered ${r1.hits}/${r1.total} key points (score ${r1.score}/${NOTES_SCENARIO.maxMarks}).</div>
      <div class="feedback ${r2.hits===r2.total?'correct':r2.hits>0?'partial':'incorrect'}">Itinerary covered ${r2.hits}/${r2.total} key details (score ${r2.score}/${ITINERARY_SCENARIO.maxMarks}).</div>`;
    }
    return { score: r1.score + r2.score, max: NOTES_SCENARIO.maxMarks + ITINERARY_SCENARIO.maxMarks, html };
  }, ()=>startPractice('notes'));
}

/* ============================================================
   COMMON SUBMIT/CHECK WIRING
   ============================================================ */
function attachCommon(mode, container, scoreFn, retryFn){
  const checkBtn = container.querySelector('#mod-check-btn');
  const retryBtn = container.querySelector('#mod-retry-btn');
  const feedbackEl = container.querySelector('#mod-feedback');

  checkBtn.addEventListener('click', ()=>{
    const result = scoreFn();
    if(mode==='practice'){
      feedbackEl.innerHTML = `<div class="feedback ${result.score>=result.max*0.8?'correct':result.score>0?'partial':'incorrect'}"><strong>Score: ${Math.round(result.score*10)/10} / ${result.max}</strong></div>` + result.html;
      checkBtn.disabled = true;
      setTimeout(()=>{ checkBtn.disabled = false; }, 400);
    } else {
      // exam mode: lock in and advance
      state.examScores[state.examOrder[state.examIndex]] = { score: result.score, max: result.max };
      advanceExam();
    }
  });

  if(retryBtn){
    retryBtn.addEventListener('click', retryFn);
  }
}

/* ============================================================
   EXAM FLOW
   ============================================================ */
function goExamIntro(){ state.mode = 'exam-intro'; render(); }

function renderExamIntro(){
  setMode('exam-intro');
  app.innerHTML = `
    <div class="top-nav"><a onclick="goMenu()">&larr; Back to menu</a></div>
    <div class="card">
      <h1>Virtual Assistant Certification Exam</h1>
      <p>This exam covers all six skill areas, worth ${TOTAL_MARKS} marks in total. Each module is submitted once, in order, and cannot be revisited. A score of ${PASS_PERCENT}% or higher earns your certificate.</p>
      <ul>
        ${MODULES.map(m=>`<li>${m.name} &mdash; ${m.marks} marks</li>`).join('')}
      </ul>
      <label class="field-label">Enter your full name as it should appear on your certificate</label>
      <input type="text" id="exam-name-input" placeholder="Full name">
      <div class="btn-row">
        <button class="btn gold" id="begin-exam-btn">Begin Exam</button>
      </div>
    </div>
  `;
  document.getElementById('begin-exam-btn').addEventListener('click', ()=>{
    const name = document.getElementById('exam-name-input').value.trim();
    if(!name){ alert('Please enter your name before starting.'); return; }
    state.studentName = name;
    state.examOrder = MODULES.map(m=>m.id);
    state.examIndex = 0;
    state.examScores = {};
    state.mode = 'exam';
    render();
  });
}

function renderExamModule(){
  setMode('exam');
  const moduleId = state.examOrder[state.examIndex];
  const m = MODULES.find(x=>x.id===moduleId);
  const pct = Math.round((state.examIndex/state.examOrder.length)*100);
  app.innerHTML = `
    <div class="card" style="padding-bottom:14px;">
      <div class="top-nav">
        <span class="pill gold">Section ${state.examIndex+1} of ${state.examOrder.length}: ${m.name}</span>
        <span class="timer-chip">${m.marks} marks</span>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div id="module-slot"></div>
  `;
  renderModuleBody('exam', moduleId, document.getElementById('module-slot'));
}

function advanceExam(){
  state.examIndex++;
  if(state.examIndex >= state.examOrder.length){
    state.mode = 'results';
  }
  render();
}

/* ============================================================
   RESULTS
   ============================================================ */
function renderResults(){
  setMode('results');
  let totalScore = 0;
  MODULES.forEach(m=>{
    const s = state.examScores[m.id];
    if(s) totalScore += s.score;
  });
  const percent = Math.round((totalScore/TOTAL_MARKS)*1000)/10;
  const passed = percent >= PASS_PERCENT;

  app.innerHTML = `
    <div class="card">
      <h1>Results for ${state.studentName}</h1>
      <h2 style="color:${passed?'var(--good)':'var(--danger)'};">${Math.round(totalScore*10)/10} / ${TOTAL_MARKS} (${percent}%)</h2>
      <span class="pill ${passed?'':'gold'}" style="background:${passed?'var(--good)':'var(--danger)'};">${passed?'PASS':'NOT YET PASSED'}</span>
      <table class="cal-table" style="margin-top:18px;">
        <tr><th>Module</th><th>Score</th><th>Max</th></tr>
        ${MODULES.map(m=>{
          const s = state.examScores[m.id] || {score:0,max:m.marks};
          return `<tr><td>${m.name}</td><td>${Math.round(s.score*10)/10}</td><td>${s.max}</td></tr>`;
        }).join('')}
      </table>
      <div class="btn-row">
        ${passed ? `<button class="btn gold" onclick="goCertificate()">View Certificate</button>` : ''}
        <button class="btn secondary" onclick="goPracticeHub()">Practice Weak Areas</button>
        <button class="btn secondary" onclick="goExamIntro()">Retake Exam</button>
        <button class="btn secondary" onclick="goMenu()">Back to Menu</button>
      </div>
      ${!passed ? `<p class="small-note">You need ${PASS_PERCENT}% to pass. Head back to practice mode on your weaker modules, then retake the exam whenever you're ready.</p>` : ''}
    </div>
  `;
}

function goCertificate(){ state.mode = 'certificate'; render(); }

/* ============================================================
   CERTIFICATE
   ============================================================ */
function renderCertificate(){
  setMode('certificate');
  let totalScore = 0;
  MODULES.forEach(m=>{ const s = state.examScores[m.id]; if(s) totalScore += s.score; });
  const percent = Math.round((totalScore/TOTAL_MARKS)*1000)/10;
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  app.innerHTML = `
    <div class="top-nav"><a onclick="goResultsFromCert()">&larr; Back to results</a></div>
    <div id="cert-canvas-wrap">
      <div class="cert">
        <h1>Certificate of Completion</h1>
        <div class="sub">SMK Consulting and Training Agency &middot; Virtual Assistant Programme</div>
        <p>This certifies that</p>
        <div class="student-name">${escapeHtml(state.studentName)}</div>
        <p>has successfully completed the Virtual Assistant Training &amp; Certification Simulator, covering calendar management, email management, data entry, task management, professional signatures, and meeting documentation.</p>
        <div class="details">Final Score: <strong>${Math.round(totalScore*10)/10} / ${TOTAL_MARKS} (${percent}%)</strong><br>Date: ${dateStr}</div>
        <div class="sign">
          <div class="sig-line">Benita Emmanuel<br><span style="font-size:11.5px;color:#777;">Facilitator, SMK Consulting and Training Agency</span></div>
          <div class="sig-line">${dateStr}<br><span style="font-size:11.5px;color:#777;">Date Issued</span></div>
        </div>
      </div>
    </div>
    <div class="btn-row" style="justify-content:center;margin-top:20px;">
      <button class="btn gold" onclick="window.print()">Print Certificate</button>
      <button class="btn secondary" onclick="goMenu()">Back to Menu</button>
    </div>
  `;
}

function goResultsFromCert(){ state.mode = 'results'; render(); }

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================
   INIT
   ============================================================ */
render();

</script>
